name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release assets
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "Loop-${TAG_NAME}-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "Loop-latest.apk"
          ls -lh "Loop-${TAG_NAME}-debug.apk" "Loop-latest.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Loop APK ${{ env.TAG_NAME }}"
          generate_release_notes: true
          files: |
            Loop-${{ env.TAG_NAME }}-debug.apk
            Loop-latest.apk
          body: |
            Automated Android APK build for ${{ env.TAG_NAME }}.

            This release currently publishes a debug APK because production release signing is not configured yet.
            Configure release signing before treating APKs as production-ready public builds.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
